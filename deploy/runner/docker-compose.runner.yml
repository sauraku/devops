name: ${RUNNER_COMPOSE_PROJECT_NAME:-devops-runner}

services:
  github-runner:
    image: ${RUNNER_IMAGE:?RUNNER_IMAGE is required}
    container_name: ${RUNNER_CONTAINER_NAME:-devops-github-runner}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    environment:
      - REPO_URL=${REPO_URL}
      - RUNNER_NAME=${RUNNER_NAME:-devops-runner}
      - RUNNER_DIR=/home/runner/runner-state
      - RUNNER_LABELS=${RUNNER_LABELS:-development}
      - DEPLOY_CONTROL_TOKEN=${DEPLOY_CONTROL_TOKEN}
      - DEPLOY_CONTROL_URL=${DEPLOY_CONTROL_URL:?DEPLOY_CONTROL_URL is required}
    volumes:
      - runner-state:/home/runner/runner-state
    networks:
      - control
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=128m
      - /run/devops-runner-registration:rw,nosuid,nodev,noexec,size=64k,mode=0700,uid=1000,gid=1000

volumes:
  runner-state:
    name: ${RUNNER_STATE_VOLUME:-devops-github-runner-state}

networks:
  control:
    external: true
    name: ${RUNNER_NETWORK:?RUNNER_NETWORK is required}
